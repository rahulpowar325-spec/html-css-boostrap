<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>String operation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="tex-primary p-4 text-center" >  string operation in java</h1>
     
 <!--    ------------------------------container 1   ---------------------------  -->


    <div class="container">
       
        <div class="mb-3">
            <label for="inputpara" class="form-label"> Example textarea </label>
            <textarea class="form-control" id="inputpara" rows="3"></textarea>
        </div>

        <div class="container bg-secondary" style="height:100px;" id="result"> 
            result will show here
        </div>

    </div>


 <!--  ---------------------------------  containewr 2 -------------------------------------------------------------      --> 

    <div class="container m-3">
        <div class="row">

            <div class="col">
                <button class="btn btn-primary">Count Num of line</button>
            </div>

            <div class="col">
                <button class="btn btn-primary" onclick="countVowel()"> Count vowels </button>
            </div>

            <div class="col">
                <button class="btn btn-primary">Extra spacial char</button>
            </div>

            <div class="col">
                <button class="btn btn-primary">convert camel case</button>
            </div>

        </div>
    </div>


    <div class="container m-3">
        <div class="row">

            <div class="col">
                <button class="btn btn-primary"  onclick="convertToUpperCase()">convert upper casse</button>
            </div>

            <div class="col">
                <button class="btn btn-primary" onclick="convertToLowerCase()"> convert lower casse</button>
            </div>

            <div class="col">
                <button class="btn btn-primary">count Consonents</button>
            </div>

            <div class="col">
                <button class="btn btn-primary">Extra firs world</button>
            </div>

        </div>
    </div>

    <div class="container m-3">
        <div class="row">
            
            <div class="col">
                <button class="btn btn-primary" onclick="CheckPalindrom()">chech palindrom</button>
            </div>
            
            <div class="col">
                <button class="btn btn-primary">count spacess</button>
            </div>

            <div class="col">
                <button class="btn btn-primary">replace all spacess with hyphen </button>
            </div>

            <div class="col">
                <button class="btn btn-primary">sort the world </button>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="Script.js"></script>
        
  </body>
</html>

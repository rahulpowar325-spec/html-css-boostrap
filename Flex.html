<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            width: 100%;
            height: 100%;
        }
        .ContantOne{
            height: 600px;
            width: 600px;
            background-color: rgb(224, 24, 24);
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: space-around;

        }
        .box{
            height: 100px;
            width: 100px;
            border-style: outset;
            border-color: rgb(0, 0, 0);
            background-color: bisque;
            text-align: center;    
            display: flex;
            justify-content: center;
            align-items:right;
            flex-wrap: wrap;

 
            
 

        }
        .BOX1{
            background-color: blueviolet;
            flex-wrap: wrap;
            

        }
        
        
        @media screen and (max-width : 450px) {
            .ContantOne{
                flex-direction :column;
            }
            .BOX1{
                order: 2;
            }
            .BOX2{
                order: 1;
            }
            .BOX3{
                order: 3;
            }
            .BOX4{
                order: 4;
                flex: 30%;
            }
            .BOX5{
                order: 5;
            }
        
            
        }
            
        
    </style>
</head>
<body>
    <div class="ContantOne">
        <div class="box BOX1">1 e deleniti laudaGFSGSGSGSGntium maxime odit, mollitia eveniet harum?</div>
        <div class="box BOX2">2</div>
        <div class="box BOX3">3</div>
        <div class="box BOX4">4</div>
        <div class="box BOX5">5</div>
    </div>
</body>
</html>
